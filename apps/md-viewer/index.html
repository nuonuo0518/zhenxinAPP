<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MD Viewer - Markdown 阅读器</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- marked.js -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<!-- highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/typescript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/css.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/markdown.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/java.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/go.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/rust.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/cpp.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;
  --border:#30363d;--border-light:#484f58;
  --text:#e6edf3;--text-dim:#8b949e;--text-muted:#6e7681;
  --accent:#58a6ff;--accent-dim:rgba(88,166,255,.15);
  --green:#3fb950;--orange:#d29922;--red:#f85149;
  --purple:#bc8cff;--pink:#f778ba;
  --radius:8px;--radius-lg:12px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --font-mono:'SF Mono','Cascadia Code','Fira Code',Consolas,monospace;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;
  --sidebar-w:280px;
  --header-h:54px;
  --tab-h:36px;
}

html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-sans);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
}

/* ========== Header ========== */
.header{
  height:var(--header-h);background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  flex-shrink:0;z-index:100;
}
.header-brand{
  display:flex;align-items:center;gap:8px;
  font-weight:600;font-size:.95rem;color:var(--text);
  text-decoration:none;letter-spacing:1px;flex-shrink:0;
}
.header-brand svg{width:22px;height:22px;fill:var(--accent)}
.header-actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;border-radius:var(--radius);
  font-size:.8rem;font-weight:500;cursor:pointer;
  border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);
  transition:all .2s;white-space:nowrap;
}
.btn:hover{border-color:var(--border-light);color:var(--text);background:var(--border)}
.btn-accent{background:var(--accent-dim);border-color:transparent;color:var(--accent)}
.btn-accent:hover{background:rgba(88,166,255,.25)}
.btn svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}

/* ========== Tab Bar ========== */
.tab-bar{
  height:var(--tab-h);background:var(--bg);
  border-bottom:1px solid var(--border);
  display:none;align-items:stretch;
  overflow-x:auto;overflow-y:hidden;flex-shrink:0;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab-bar.visible{display:flex}

.tab{
  display:flex;align-items:center;gap:6px;
  padding:0 14px;font-size:.78rem;color:var(--text-dim);
  cursor:pointer;border-right:1px solid var(--border);
  background:var(--bg);white-space:nowrap;position:relative;
  transition:background .15s,color .15s;flex-shrink:0;
  max-width:200px;min-width:0;
}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{
  background:var(--surface);color:var(--text);
  box-shadow:inset 0 -2px 0 var(--accent);
}
.tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-close{
  display:flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:4px;flex-shrink:0;
  opacity:0;transition:opacity .15s,background .15s;
}
.tab:hover .tab-close,.tab.active .tab-close{opacity:1}
.tab-close:hover{background:rgba(255,255,255,.1)}
.tab-close svg{width:12px;height:12px;fill:currentColor}
.tab-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--accent);opacity:.6;
}

/* Add tab button */
.tab-add{
  display:flex;align-items:center;justify-content:center;
  width:var(--tab-h);flex-shrink:0;cursor:pointer;
  color:var(--text-muted);transition:all .15s;
}
.tab-add:hover{color:var(--text);background:var(--surface2)}
.tab-add svg{width:16px;height:16px;fill:currentColor}

/* ========== Layout ========== */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ========== Sidebar / TOC ========== */
.sidebar{
  width:var(--sidebar-w);background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:margin-left .3s ease;overflow:hidden;
}
.sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}
.sidebar-header{
  padding:14px 16px 10px;font-size:.75rem;font-weight:600;
  color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.toc{flex:1;overflow-y:auto;padding:8px 0}
.toc::-webkit-scrollbar{width:4px}
.toc::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.toc-item{
  display:block;padding:5px 16px;font-size:.82rem;
  color:var(--text-dim);text-decoration:none;cursor:pointer;
  border-left:2px solid transparent;transition:all .15s;
  line-height:1.5;
}
.toc-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.toc-item.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-dim)}
.toc-item[data-level="2"]{padding-left:28px}
.toc-item[data-level="3"]{padding-left:40px;font-size:.78rem}
.toc-item[data-level="4"]{padding-left:52px;font-size:.76rem}
.toc-item[data-level="5"]{padding-left:64px;font-size:.74rem}
.toc-item[data-level="6"]{padding-left:76px;font-size:.72rem}

.toc-empty{
  padding:20px 16px;color:var(--text-muted);font-size:.82rem;
  text-align:center;line-height:1.6;
}

/* ========== Content ========== */
.content-wrap{flex:1;overflow:hidden;position:relative}

/* Each tab's panel */
.tab-panel{
  position:absolute;inset:0;overflow-y:auto;
  display:none;
}
.tab-panel.active{display:block}
.tab-panel::-webkit-scrollbar{width:6px}
.tab-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* ========== Drop Zone ========== */
.drop-zone{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:40px;text-align:center;
}
.drop-zone-icon{
  width:80px;height:80px;margin-bottom:24px;
  border:2px dashed var(--border);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  transition:all .3s;
}
.drop-zone-icon svg{width:36px;height:36px;fill:var(--text-muted)}
.drop-zone h2{font-size:1.2rem;font-weight:600;margin-bottom:10px;color:var(--text)}
.drop-zone p{color:var(--text-dim);font-size:.85rem;line-height:1.7;max-width:420px}
.drop-zone kbd{
  display:inline-block;padding:2px 7px;margin:0 2px;
  background:var(--surface2);border:1px solid var(--border);border-radius:4px;
  font-family:var(--font-mono);font-size:.75rem;color:var(--text-dim);
}

body.dragging .drop-zone-icon{border-color:var(--accent);background:var(--accent-dim)}
body.dragging .drop-zone-icon svg{fill:var(--accent)}

/* ========== Rendered Markdown ========== */
.md-body{
  max-width:860px;margin:0 auto;padding:36px 48px 80px;
  font-size:15px;line-height:1.75;word-wrap:break-word;
}

.md-body h1,.md-body h2,.md-body h3,.md-body h4,.md-body h5,.md-body h6{
  margin-top:28px;margin-bottom:16px;font-weight:600;line-height:1.3;
  scroll-margin-top:20px;
}
.md-body h1{font-size:1.8em;padding-bottom:10px;border-bottom:1px solid var(--border)}
.md-body h2{font-size:1.45em;padding-bottom:8px;border-bottom:1px solid var(--border)}
.md-body h3{font-size:1.2em}
.md-body h4{font-size:1.05em}
.md-body h5{font-size:.95em;color:var(--text-dim)}
.md-body h6{font-size:.88em;color:var(--text-muted)}

.md-body p{margin-bottom:16px}
.md-body a{color:var(--accent);text-decoration:none}
.md-body a:hover{text-decoration:underline}
.md-body strong{font-weight:600;color:#fff}
.md-body em{font-style:italic;color:var(--text-dim)}

.md-body img{
  max-width:100%;border-radius:var(--radius);
  border:1px solid var(--border);margin:8px 0;
}

.md-body ul,.md-body ol{margin-bottom:16px;padding-left:28px}
.md-body li{margin-bottom:4px}
.md-body li>p{margin-bottom:6px}

.md-body blockquote{
  margin:0 0 16px;padding:8px 16px;
  border-left:3px solid var(--accent);
  background:var(--accent-dim);border-radius:0 var(--radius) var(--radius) 0;
  color:var(--text-dim);
}
.md-body blockquote p:last-child{margin-bottom:0}

.md-body hr{
  margin:28px 0;border:none;
  border-top:1px solid var(--border);
}

.md-body table{
  width:100%;border-collapse:collapse;margin-bottom:16px;
  font-size:.9em;
}
.md-body th,.md-body td{
  padding:8px 14px;border:1px solid var(--border);text-align:left;
}
.md-body th{background:var(--surface);font-weight:600;color:var(--text)}
.md-body tr:nth-child(even){background:rgba(255,255,255,.02)}

.md-body code{
  font-family:var(--font-mono);font-size:.88em;
  background:var(--surface2);padding:2px 6px;border-radius:4px;
  color:var(--orange);
}
.md-body pre{
  margin-bottom:16px;border-radius:var(--radius-lg);overflow:hidden;
  border:1px solid var(--border);position:relative;
}
.md-body pre code{
  display:block;padding:16px 20px;overflow-x:auto;
  background:var(--surface);color:var(--text);
  font-size:.85em;line-height:1.65;
}

/* Code block header */
.code-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:var(--surface2);
  border-bottom:1px solid var(--border);
  font-size:.72rem;color:var(--text-muted);
}
.copy-btn{
  cursor:pointer;display:flex;align-items:center;gap:4px;
  background:none;border:none;color:var(--text-muted);font-size:.72rem;
  padding:2px 6px;border-radius:4px;transition:all .15s;
}
.copy-btn:hover{color:var(--text);background:rgba(255,255,255,.08)}
.copy-btn.copied{color:var(--green)}
.copy-btn svg{width:13px;height:13px;fill:currentColor}

/* Checkbox (task list) */
.md-body input[type="checkbox"]{
  margin-right:6px;accent-color:var(--accent);
}

/* ========== Search Bar ========== */
.search-bar{
  position:fixed;top:calc(var(--header-h) + var(--tab-h) + 16px);right:20px;z-index:200;
  display:none;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:6px 12px;
  box-shadow:var(--shadow);
}
.search-bar.open{display:flex}
.search-bar input{
  background:none;border:none;outline:none;color:var(--text);
  font-size:.85rem;width:240px;font-family:var(--font-sans);
}
.search-bar input::placeholder{color:var(--text-muted)}
.search-info{font-size:.75rem;color:var(--text-dim);white-space:nowrap}
.search-nav{display:flex;gap:2px}
.search-nav button{
  background:none;border:none;cursor:pointer;color:var(--text-dim);
  padding:4px;border-radius:4px;display:flex;
}
.search-nav button:hover{color:var(--text);background:rgba(255,255,255,.08)}
.search-nav button svg{width:14px;height:14px;fill:currentColor}

mark.search-highlight{background:rgba(230,180,34,.35);color:inherit;border-radius:2px}
mark.search-highlight.current{background:rgba(230,180,34,.7)}

/* ========== Progress Bar ========== */
.progress-bar{
  position:fixed;top:var(--header-h);left:0;right:0;height:2px;z-index:99;
}
.tab-bar.visible ~ .main .progress-bar,
body:has(.tab-bar.visible) .progress-bar{
  top:calc(var(--header-h) + var(--tab-h));
}
.progress-bar-inner{
  height:100%;width:0;background:var(--accent);
  transition:width .1s linear;
}

/* ========== Scroll to Top ========== */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:90;
  width:40px;height:40px;border-radius:50%;
  background:var(--surface);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;pointer-events:none;transition:all .3s;
  box-shadow:var(--shadow);
}
.scroll-top.visible{opacity:1;pointer-events:auto}
.scroll-top:hover{border-color:var(--accent);background:var(--accent-dim)}
.scroll-top svg{width:18px;height:18px;fill:var(--text-dim)}

/* ========== Word Count ========== */
.word-count{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:4px 16px;font-size:.72rem;color:var(--text-muted);
  z-index:90;opacity:0;pointer-events:none;transition:opacity .3s;
  box-shadow:var(--shadow);
}
.word-count.visible{opacity:1;pointer-events:auto}

/* ========== Responsive ========== */
@media(max-width:768px){
  :root{--sidebar-w:260px}
  .sidebar{
    position:absolute;top:0;left:0;bottom:0;z-index:50;
    box-shadow:var(--shadow);
  }
  .sidebar.collapsed{margin-left:calc(var(--sidebar-w) * -1)}
  .md-body{padding:24px 20px 60px}
  .search-bar input{width:160px}
  .tab{max-width:140px;padding:0 10px}
}

/* Print style */
@media print{
  .header,.sidebar,.scroll-top,.word-count,.progress-bar,.search-bar,.tab-bar{display:none!important}
  .content-wrap{overflow:visible!important}
  .tab-panel{position:static!important;display:block!important;overflow:visible!important}
  .md-body{max-width:none;padding:0;color:#000}
  .md-body pre code{white-space:pre-wrap}
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <a class="header-brand" href="../../index.html">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM6 20V4h7v5h5v11H6z"/><path d="M8 12h8v1.5H8zm0 3h6v1.5H8z" opacity=".7"/></svg>
    MD Viewer
  </a>

  <div class="header-actions">
    <button class="btn" id="btnToc" title="目录 (Ctrl+B)">
      <svg viewBox="0 0 24 24"><path d="M3 4h18v2H3zm0 7h12v2H3zm0 7h18v2H3z"/></svg>
      目录
    </button>
    <button class="btn" id="btnSearch" title="搜索 (Ctrl+F)">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
    <label class="btn btn-accent" id="btnOpen" title="打开文件 (Ctrl+O)">
      <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
      打开
      <input type="file" id="fileInput" accept=".md,.markdown,.mdown,.mkd,.mkdn,.mdwn,.mdtxt,.txt" multiple style="display:none">
    </label>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar">
  <div class="tab-add" id="tabAdd" title="打开新文件 (Ctrl+O)">
    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </div>
</div>

<!-- Progress Bar -->
<div class="progress-bar"><div class="progress-bar-inner" id="progressBar"></div></div>

<!-- Search Bar -->
<div class="search-bar" id="searchBar">
  <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:var(--text-muted);flex-shrink:0"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  <input type="text" id="searchInput" placeholder="搜索当前文档...">
  <span class="search-info" id="searchInfo"></span>
  <div class="search-nav">
    <button id="searchPrev" title="上一个 (Shift+Enter)">
      <svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
    </button>
    <button id="searchNext" title="下一个 (Enter)">
      <svg viewBox="0 0 24 24"><path d="M7.41 8.59 12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
    </button>
    <button id="searchClose" title="关闭 (Esc)">
      <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Sidebar / TOC -->
  <div class="sidebar collapsed" id="sidebar">
    <div class="sidebar-header">📑 目录</div>
    <nav class="toc" id="toc"></nav>
  </div>

  <!-- Content (panels will be created dynamically) -->
  <div class="content-wrap" id="contentWrap">
    <!-- Welcome panel (no tab) -->
    <div class="tab-panel active" id="welcomePanel">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2.5L18.5 10H13V4.5zM6 20V4h5v7h7v9H6z"/></svg>
        </div>
        <h2>打开 Markdown 文件</h2>
        <p>
          拖放 <kbd>.md</kbd> 文件到此处（支持多文件）<br>
          或点击右上角 <strong>打开</strong> 按钮选择文件<br>
          也可以直接 <kbd>Ctrl</kbd>+<kbd>V</kbd> 粘贴 Markdown 文本<br><br>
          <span style="color:var(--accent)">✨ 支持多标签页同时查看</span>
        </p>
      </div>
    </div>
  </div>
</div>

<!-- Scroll to Top -->
<button class="scroll-top" id="scrollTop" title="回到顶部">
  <svg viewBox="0 0 24 24"><path d="M7.41 15.41 12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
</button>

<!-- Word Count -->
<div class="word-count" id="wordCount"></div>

<script>
(function(){
  // ====== Elements ======
  const $ = id => document.getElementById(id);
  const sidebar     = $('sidebar');
  const toc         = $('toc');
  const contentWrap = $('contentWrap');
  const welcomePanel= $('welcomePanel');
  const fileInput   = $('fileInput');
  const btnToc      = $('btnToc');
  const btnSearch   = $('btnSearch');
  const tabBar      = $('tabBar');
  const tabAdd      = $('tabAdd');
  const searchBar   = $('searchBar');
  const searchInput = $('searchInput');
  const searchInfo  = $('searchInfo');
  const progressBar = $('progressBar');
  const scrollTopBtn= $('scrollTop');
  const wordCountEl = $('wordCount');

  // ====== Tab State ======
  let tabs = [];       // [{id, name, markdown, html, scrollTop}]
  let activeTabId = null;
  let tabCounter = 0;
  let searchMatches = [];
  let searchIndex = -1;

  // Tab colors for the dots
  const tabColors = ['#58a6ff','#3fb950','#d29922','#f85149','#bc8cff','#f778ba','#79c0ff','#56d4dd'];

  // ====== Marked config ======
  marked.setOptions({ breaks:true, gfm:true });

  const renderer = new marked.Renderer();
  renderer.code = function(obj){
    let code, lang;
    if(typeof obj === 'object' && obj !== null){
      code = obj.text || obj.raw || '';
      lang = obj.lang || '';
    } else {
      code = obj;
      lang = arguments[1] || '';
    }
    code = code.replace(/\n$/, '');
    let highlighted;
    if(lang && hljs.getLanguage(lang)){
      try{ highlighted = hljs.highlight(code,{language:lang}).value; }catch(e){ highlighted = escapeHtml(code); }
    } else {
      try{ highlighted = hljs.highlightAuto(code).value; }catch(e){ highlighted = escapeHtml(code); }
    }
    const langLabel = lang ? lang.toUpperCase() : 'CODE';
    return '<pre><div class="code-header"><span>'+langLabel+'</span><button class="copy-btn" onclick="copyCode(this)"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>\u590d\u5236</button></div><code class="hljs language-'+lang+'">'+highlighted+'</code></pre>';
  };

  renderer.listitem = function(obj){
    let text = typeof obj === 'object' ? (obj.text || '') : obj;
    if(/^\[[ x]\]\s/.test(text)){
      const checked = text.startsWith('[x]');
      text = text.replace(/^\[[ x]\]\s*/, '');
      return '<li style="list-style:none"><input type="checkbox" disabled '+(checked?'checked':'')+'>' + text + '</li>\n';
    }
    return '<li>' + text + '</li>\n';
  };

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.copyCode = function(btn){
    const code = btn.closest('pre').querySelector('code');
    navigator.clipboard.writeText(code.textContent).then(()=>{
      btn.classList.add('copied');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>\u5df2\u590d\u5236';
      setTimeout(()=>{
        btn.classList.remove('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>\u590d\u5236';
      }, 2000);
    });
  };

  // ====== Tab Management ======
  function createTab(name, markdown){
    const id = 'tab-' + (++tabCounter);
    const html = marked.parse(markdown, {renderer});
    const color = tabColors[(tabCounter - 1) % tabColors.length];

    const tabData = {id, name: name || '\u7c98\u8d34\u7684\u6587\u672c', markdown, html, scrollTop:0, color};
    tabs.push(tabData);

    // Create panel
    const panel = document.createElement('div');
    panel.className = 'tab-panel';
    panel.id = id + '-panel';
    const body = document.createElement('article');
    body.className = 'md-body';
    body.innerHTML = html;
    panel.appendChild(body);
    contentWrap.appendChild(panel);

    // Panel scroll listener
    panel.addEventListener('scroll', ()=>{
      if(activeTabId !== id) return;
      tabData.scrollTop = panel.scrollTop;
      const pct = panel.scrollTop / (panel.scrollHeight - panel.clientHeight) * 100;
      progressBar.style.width = Math.min(pct||0, 100) + '%';
      scrollTopBtn.classList.toggle('visible', panel.scrollTop > 300);
    });

    renderTabBar();
    switchTab(id);
    return id;
  }

  function removeTab(id){
    const idx = tabs.findIndex(t=>t.id===id);
    if(idx < 0) return;
    tabs.splice(idx, 1);

    // Remove panel
    const panel = $(id + '-panel');
    if(panel) panel.remove();

    if(tabs.length === 0){
      activeTabId = null;
      renderTabBar();
      showWelcome();
    } else {
      // Switch to neighbor
      const newIdx = Math.min(idx, tabs.length - 1);
      renderTabBar();
      switchTab(tabs[newIdx].id);
    }
  }

  function switchTab(id){
    // Save current scroll
    if(activeTabId){
      const cur = tabs.find(t=>t.id===activeTabId);
      const curPanel = $(activeTabId + '-panel');
      if(cur && curPanel) cur.scrollTop = curPanel.scrollTop;
    }

    activeTabId = id;
    const tab = tabs.find(t=>t.id===id);
    if(!tab) return;

    // Hide welcome, show panels
    welcomePanel.classList.remove('active');
    contentWrap.querySelectorAll('.tab-panel').forEach(p=>{
      p.classList.toggle('active', p.id === id + '-panel');
    });

    // Restore scroll
    const panel = $(id + '-panel');
    if(panel) panel.scrollTop = tab.scrollTop;

    // Update title
    document.title = tab.name + ' - MD Viewer';

    // Update tab bar highlights
    tabBar.querySelectorAll('.tab').forEach(el=>{
      el.classList.toggle('active', el.dataset.id === id);
    });

    // Build TOC for this tab
    buildTocFor(id);

    // Update word count
    updateWordCount(tab.markdown);

    // Update progress
    if(panel){
      const pct = panel.scrollTop / (panel.scrollHeight - panel.clientHeight) * 100;
      progressBar.style.width = Math.min(pct||0, 100) + '%';
      scrollTopBtn.classList.toggle('visible', panel.scrollTop > 300);
    }

    // Auto show sidebar if headings
    const body = panel?.querySelector('.md-body');
    if(body){
      const headings = body.querySelectorAll('h1,h2,h3,h4,h5,h6');
      if(headings.length > 1) sidebar.classList.remove('collapsed');
    }

    // Close search when switching
    closeSearch();
  }

  function showWelcome(){
    welcomePanel.classList.add('active');
    contentWrap.querySelectorAll('.tab-panel:not(#welcomePanel)').forEach(p=>p.classList.remove('active'));
    document.title = 'MD Viewer - Markdown \u9605\u8bfb\u5668';
    toc.innerHTML = '';
    wordCountEl.classList.remove('visible');
    progressBar.style.width = '0%';
    scrollTopBtn.classList.remove('visible');
  }

  function renderTabBar(){
    // Remove old tabs (keep tabAdd)
    tabBar.querySelectorAll('.tab').forEach(el=>el.remove());

    if(tabs.length === 0){
      tabBar.classList.remove('visible');
      return;
    }

    tabBar.classList.add('visible');

    tabs.forEach(t=>{
      const el = document.createElement('div');
      el.className = 'tab' + (t.id === activeTabId ? ' active' : '');
      el.dataset.id = t.id;
      el.innerHTML =
        '<span class="tab-dot" style="background:'+t.color+'"></span>' +
        '<span class="tab-name" title="'+escapeHtml(t.name)+'">'+escapeHtml(t.name)+'</span>' +
        '<span class="tab-close"><svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></span>';

      el.addEventListener('click', e=>{
        if(e.target.closest('.tab-close')){
          e.stopPropagation();
          removeTab(t.id);
          return;
        }
        switchTab(t.id);
      });

      // Middle click to close
      el.addEventListener('auxclick', e=>{
        if(e.button === 1){
          e.preventDefault();
          removeTab(t.id);
        }
      });

      tabBar.insertBefore(el, tabAdd);
    });
  }

  // ====== Build TOC for specific tab ======
  function buildTocFor(tabId){
    toc.innerHTML = '';
    const panel = $(tabId + '-panel');
    if(!panel) return;
    const body = panel.querySelector('.md-body');
    if(!body) return;
    const headings = body.querySelectorAll('h1,h2,h3,h4,h5,h6');
    if(headings.length === 0){
      toc.innerHTML = '<div class="toc-empty">\u6b64\u6587\u6863\u6ca1\u6709\u6807\u9898</div>';
      return;
    }
    headings.forEach((h, i)=>{
      const hid = tabId + '-h-' + i;
      h.id = hid;
      const level = parseInt(h.tagName[1]);
      const item = document.createElement('a');
      item.className = 'toc-item';
      item.dataset.level = level;
      item.textContent = h.textContent;
      item.href = '#' + hid;
      item.onclick = function(e){
        e.preventDefault();
        h.scrollIntoView({behavior:'smooth',block:'start'});
      };
      toc.appendChild(item);
    });
    observeHeadings(headings, panel);
  }

  let headingObserver = null;
  function observeHeadings(headings, scrollContainer){
    if(headingObserver) headingObserver.disconnect();
    const tocItems = toc.querySelectorAll('.toc-item');
    if(!tocItems.length) return;

    headingObserver = new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          tocItems.forEach(t=>t.classList.remove('active'));
          const idx = Array.from(headings).indexOf(entry.target);
          if(idx >= 0 && tocItems[idx]){
            tocItems[idx].classList.add('active');
            tocItems[idx].scrollIntoView({block:'nearest'});
          }
        }
      });
    },{root:scrollContainer, rootMargin:'-10% 0px -80% 0px', threshold:0});
    headings.forEach(h=>headingObserver.observe(h));
  }

  // ====== Word Count ======
  function updateWordCount(md){
    const chinese = (md.match(/[\u4e00-\u9fff]/g)||[]).length;
    const english = (md.match(/[a-zA-Z]+/g)||[]).length;
    const lines = md.split('\n').length;
    wordCountEl.textContent = (chinese+english)+' \u5b57 \u00b7 '+lines+' \u884c \u00b7 \u7ea6 '+Math.ceil((chinese+english)/300)+' \u5206\u949f\u9605\u8bfb';
    wordCountEl.classList.add('visible');
  }

  // ====== File Input (supports multiple) ======
  fileInput.addEventListener('change', e=>{
    const files = Array.from(e.target.files);
    if(!files.length) return;
    files.forEach(f => readFileToTab(f));
    fileInput.value = ''; // reset
  });

  function readFileToTab(f){
    const reader = new FileReader();
    reader.onload = ()=> createTab(f.name, reader.result);
    reader.readAsText(f);
  }

  // ====== Drag & Drop (supports multiple) ======
  document.addEventListener('dragover', e=>{
    e.preventDefault();
    document.body.classList.add('dragging');
  });
  document.addEventListener('dragleave', e=>{
    if(e.relatedTarget) return;
    document.body.classList.remove('dragging');
  });
  document.addEventListener('drop', e=>{
    e.preventDefault();
    document.body.classList.remove('dragging');
    const files = Array.from(e.dataTransfer.files);
    files.forEach(f => readFileToTab(f));
  });

  // ====== Paste ======
  document.addEventListener('paste', e=>{
    if(document.activeElement === searchInput) return;
    const text = e.clipboardData.getData('text/plain');
    if(text && text.trim()){
      createTab(null, text.trim());
    }
  });

  // ====== Tab Add button ======
  tabAdd.addEventListener('click', ()=> fileInput.click());

  // ====== TOC Toggle ======
  btnToc.addEventListener('click', ()=> sidebar.classList.toggle('collapsed'));

  // ====== Search (scoped to active tab) ======
  function getActiveBody(){
    if(!activeTabId) return null;
    const panel = $(activeTabId + '-panel');
    return panel?.querySelector('.md-body') || null;
  }

  function openSearch(){
    if(!activeTabId) return;
    searchBar.classList.add('open');
    searchInput.focus();
    searchInput.select();
  }
  function closeSearch(){
    searchBar.classList.remove('open');
    searchInput.value = '';
    clearHighlights();
    searchInfo.textContent = '';
    searchMatches = [];
    searchIndex = -1;
  }

  btnSearch.addEventListener('click', openSearch);
  $('searchClose').addEventListener('click', closeSearch);

  searchInput.addEventListener('input', ()=> doSearch(searchInput.value));
  searchInput.addEventListener('keydown', e=>{
    if(e.key === 'Enter'){
      e.preventDefault();
      if(e.shiftKey) navigateSearch(-1);
      else navigateSearch(1);
    }
    if(e.key === 'Escape') closeSearch();
  });
  $('searchPrev').addEventListener('click', ()=> navigateSearch(-1));
  $('searchNext').addEventListener('click', ()=> navigateSearch(1));

  function doSearch(query){
    clearHighlights();
    searchMatches = [];
    searchIndex = -1;
    const body = getActiveBody();
    if(!body || !query.trim()){
      searchInfo.textContent = '';
      return;
    }
    const walker = document.createTreeWalker(body, NodeFilter.SHOW_TEXT);
    const textNodes = [];
    while(walker.nextNode()) textNodes.push(walker.currentNode);

    const lq = query.toLowerCase();
    textNodes.forEach(node=>{
      const text = node.textContent;
      const lt = text.toLowerCase();
      let idx = 0;
      const parts = [];
      let lastEnd = 0;
      while((idx = lt.indexOf(lq, idx)) !== -1){
        if(idx > lastEnd) parts.push({text:text.slice(lastEnd,idx),match:false});
        parts.push({text:text.slice(idx,idx+query.length),match:true});
        lastEnd = idx + query.length;
        idx += query.length;
      }
      if(parts.length && lastEnd < text.length){
        parts.push({text:text.slice(lastEnd),match:false});
      }
      if(parts.length){
        const frag = document.createDocumentFragment();
        parts.forEach(p=>{
          if(p.match){
            const mark = document.createElement('mark');
            mark.className = 'search-highlight';
            mark.textContent = p.text;
            frag.appendChild(mark);
            searchMatches.push(mark);
          } else {
            frag.appendChild(document.createTextNode(p.text));
          }
        });
        node.parentNode.replaceChild(frag, node);
      }
    });
    searchInfo.textContent = searchMatches.length ? searchMatches.length+' \u4e2a\u7ed3\u679c' : '\u65e0\u7ed3\u679c';
    if(searchMatches.length){
      searchIndex = 0;
      highlightCurrent();
    }
  }

  function navigateSearch(dir){
    if(!searchMatches.length) return;
    searchMatches[searchIndex]?.classList.remove('current');
    searchIndex = (searchIndex + dir + searchMatches.length) % searchMatches.length;
    highlightCurrent();
  }

  function highlightCurrent(){
    const m = searchMatches[searchIndex];
    if(!m) return;
    m.classList.add('current');
    m.scrollIntoView({behavior:'smooth',block:'center'});
    searchInfo.textContent = (searchIndex+1)+' / '+searchMatches.length;
  }

  function clearHighlights(){
    const body = getActiveBody();
    if(!body) return;
    body.querySelectorAll('mark.search-highlight').forEach(mark=>{
      const parent = mark.parentNode;
      parent.replaceChild(document.createTextNode(mark.textContent), mark);
      parent.normalize();
    });
  }

  // ====== Scroll to top ======
  scrollTopBtn.addEventListener('click', ()=>{
    if(!activeTabId) return;
    const panel = $(activeTabId + '-panel');
    if(panel) panel.scrollTo({top:0,behavior:'smooth'});
  });

  // ====== Keyboard shortcuts ======
  document.addEventListener('keydown', e=>{
    const mod = e.ctrlKey || e.metaKey;
    if(mod && e.key === 'o'){
      e.preventDefault();
      fileInput.click();
    }
    if(mod && e.key === 'f'){
      e.preventDefault();
      if(activeTabId) openSearch();
    }
    if(mod && e.key === 'b'){
      e.preventDefault();
      sidebar.classList.toggle('collapsed');
    }
    if(mod && e.key === 'w'){
      e.preventDefault();
      if(activeTabId) removeTab(activeTabId);
    }
    // Ctrl+Tab / Ctrl+Shift+Tab to switch tabs
    if(mod && e.key === 'Tab'){
      e.preventDefault();
      if(tabs.length < 2) return;
      const idx = tabs.findIndex(t=>t.id===activeTabId);
      const dir = e.shiftKey ? -1 : 1;
      const next = (idx + dir + tabs.length) % tabs.length;
      switchTab(tabs[next].id);
    }
    if(e.key === 'Escape') closeSearch();
  });

  // ====== URL params ======
  const params = new URLSearchParams(location.search);
  const mdUrl = params.get('url');
  if(mdUrl){
    fetch(mdUrl)
      .then(r=>{ if(!r.ok) throw new Error(r.status); return r.text(); })
      .then(text=>{
        const name = mdUrl.split('/').pop() || 'remote.md';
        createTab(name, text);
      })
      .catch(err=>{
        createTab('Error', '# \u52a0\u8f7d\u5931\u8d25\n\n**URL:** `'+mdUrl+'`\n\n**\u9519\u8bef:** '+err.message);
      });
  }

})();
</script>

</body>
</html>
