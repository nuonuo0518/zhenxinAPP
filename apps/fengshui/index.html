<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="八字命理">
<meta name="theme-color" content="#e6b422">
<meta name="description" content="输入生辰八字，排盘分析命格与运势">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<title>八字命理 · 命盘排盘系统</title>
<style>
/* ===== 全局 ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--accent:#e6b422;--accent2:#c9302c;
  --text:#e8e0d0;--dim:#887a6a;--water:#4a9bd9;--wood:#5cb85c;
  --fire:#d9534f;--earth:#d4a017;--metal:#f0f0f0;
  --border:rgba(230,180,34,0.15);
}
html{font-size:14px;overflow-x:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'PingFang SC','Microsoft YaHei','Noto Serif SC',serif;
  min-height:100vh;overflow-x:hidden;
}
a{color:var(--accent);text-decoration:none}

/* ===== 布局 ===== */
.app{max-width:1100px;margin:0 auto;padding:20px 16px 60px;width:100%;overflow-x:hidden}
header{text-align:center;padding:30px 0 20px;position:relative}
header h1{
  font-size:2rem;letter-spacing:6px;color:var(--accent);
  text-shadow:0 0 20px rgba(230,180,34,0.3);
}
header p{color:var(--dim);margin-top:6px;font-size:.9rem}

/* 输入区 */
.input-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:24px 28px;margin:20px 0;
}
.input-section h2{color:var(--accent);font-size:1.1rem;margin-bottom:16px;letter-spacing:2px}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.form-group label{color:var(--dim);font-size:.8rem}
.form-group select,.form-group input{
  background:#12122a;border:1px solid var(--border);color:var(--text);
  padding:8px 12px;border-radius:6px;font-size:.95rem;
  outline:none;transition:border .2s;
}
.form-group select:focus,.form-group input:focus{border-color:var(--accent)}
.gender-row{display:flex;gap:12px;align-items:center}
.gender-row label{
  cursor:pointer;padding:6px 18px;border:1px solid var(--border);
  border-radius:6px;color:var(--dim);transition:all .2s;font-size:.9rem;
}
.gender-row input{display:none}
.gender-row input:checked+label{
  border-color:var(--accent);color:var(--accent);
  background:rgba(230,180,34,0.08);
}
.btn-calc{
  background:linear-gradient(135deg,#e6b422,#c9960a);
  color:#1a1a2e;border:none;padding:10px 32px;border-radius:8px;
  font-size:1rem;font-weight:bold;cursor:pointer;letter-spacing:2px;
  transition:transform .15s,box-shadow .15s;
}
.btn-calc:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(230,180,34,0.3)}
.btn-calc:active{transform:scale(.97)}

/* 结果区 */
.result-area{display:none}
.result-area.show{display:block}

/* 四柱卡片 */
.pillars{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;
}
.pillar{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  text-align:center;padding:16px 8px;position:relative;overflow:hidden;
}
.pillar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
}
.pillar-label{color:var(--dim);font-size:.75rem;letter-spacing:2px;margin-bottom:8px}
.pillar-gan{font-size:1.6rem;font-weight:bold;margin:4px 0}
.pillar-zhi{font-size:1.6rem;font-weight:bold;margin:4px 0}
.pillar-element{font-size:.75rem;margin:2px 0;opacity:.7}
.pillar-nayin{font-size:.7rem;color:var(--dim);margin-top:6px}
.pillar-cang{font-size:.75rem;color:var(--dim);margin-top:4px}

/* 五行颜色 */
.wx-wood{color:var(--wood)}.wx-fire{color:var(--fire)}
.wx-earth{color:var(--earth)}.wx-metal{color:var(--metal)}
.wx-water{color:var(--water)}

/* 分析区块 */
.analysis-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:20px 24px;margin:16px 0;
}
.analysis-card h3{
  color:var(--accent);font-size:1rem;letter-spacing:2px;
  border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;
}
.analysis-card h4{color:var(--accent);font-size:.9rem;margin:12px 0 6px;opacity:.85}

/* 五行图 */
.wuxing-chart{display:flex;gap:8px;align-items:flex-end;height:120px;margin:12px 0}
.wx-bar{
  flex:1;border-radius:6px 6px 0 0;position:relative;
  transition:height .5s ease;min-height:4px;
}
.wx-bar span{
  position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);
  font-size:.75rem;white-space:nowrap;
}
.wx-bar .count{
  position:absolute;top:-18px;left:50%;transform:translateX(-50%);
  font-size:.7rem;color:var(--text);
}

/* 十神表格 */
.shishen-table{width:100%;border-collapse:collapse;margin:8px 0;display:block;overflow-x:auto}
.shishen-table th,.shishen-table td{
  padding:6px 10px;text-align:center;border:1px solid var(--border);font-size:.85rem;
}
.shishen-table th{background:rgba(230,180,34,0.06);color:var(--accent)}

/* 大运 */
.dayun-flow{display:flex;gap:8px;overflow-x:auto;padding:8px 0}
.dayun-item{
  min-width:70px;text-align:center;padding:10px 8px;
  border:1px solid var(--border);border-radius:8px;
  background:var(--card);flex-shrink:0;transition:all .2s;
  cursor:default;
}
.dayun-item.current{
  border-color:var(--accent);
  background:rgba(230,180,34,0.08);
  box-shadow:0 0 10px rgba(230,180,34,0.15);
}
.dayun-item .age{font-size:.7rem;color:var(--dim)}
.dayun-item .gz{font-size:1rem;font-weight:bold;margin:4px 0}
.dayun-item .year-range{font-size:.65rem;color:var(--dim)}

/* 综合分析 */
.summary-text{line-height:1.8;font-size:.9rem;color:var(--text)}
.summary-text p{margin:6px 0}
.tag{
  display:inline-block;padding:2px 10px;border-radius:4px;font-size:.75rem;
  margin:2px 4px;
}
.tag-good{background:rgba(92,184,92,0.15);color:var(--wood)}
.tag-bad{background:rgba(217,83,79,0.15);color:var(--fire)}
.tag-neutral{background:rgba(230,180,34,0.1);color:var(--accent)}

/* 导出按钮栏 */
.export-bar{
  display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;
}
.btn-export{
  background:transparent;border:1px solid var(--accent);color:var(--accent);
  padding:8px 20px;border-radius:8px;font-size:.85rem;cursor:pointer;
  transition:all .2s;letter-spacing:1px;display:flex;align-items:center;gap:6px;
}
.btn-export:hover{background:rgba(230,180,34,0.1);transform:translateY(-1px)}
.btn-export:active{transform:scale(.97)}
.btn-export.primary{
  background:linear-gradient(135deg,#e6b422,#c9960a);color:#1a1a2e;
  border:none;font-weight:bold;
}
.btn-export svg{width:16px;height:16px;fill:currentColor}
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-60px);
  background:rgba(230,180,34,0.95);color:#1a1a2e;padding:10px 28px;
  border-radius:8px;font-size:.9rem;font-weight:bold;z-index:9999;
  transition:transform .3s ease,opacity .3s;opacity:0;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* 对话区 */
.chat-section{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  margin:20px 0;overflow:hidden;
}
.chat-header{
  padding:14px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.chat-header h3{color:var(--accent);font-size:1rem;letter-spacing:2px;margin:0}
.chat-header .chat-hint{color:var(--dim);font-size:.75rem}
.chat-messages{
  padding:16px 20px;max-height:500px;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.chat-msg{
  max-width:85%;padding:10px 16px;border-radius:12px;
  font-size:.88rem;line-height:1.7;position:relative;
  animation:msgIn .3s ease;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}
.chat-msg.user{
  align-self:flex-end;background:rgba(230,180,34,0.12);
  color:var(--text);border-bottom-right-radius:4px;
}
.chat-msg.assistant{
  align-self:flex-start;background:rgba(74,155,217,0.08);
  color:var(--text);border-bottom-left-radius:4px;
}
.chat-msg.system{
  align-self:center;background:rgba(230,180,34,0.06);
  color:var(--dim);font-size:.8rem;max-width:95%;text-align:center;
  border-radius:8px;
}
.chat-msg .msg-label{
  font-size:.7rem;color:var(--dim);margin-bottom:4px;
}
.chat-msg p{margin:4px 0}
.chat-msg strong{color:var(--accent)}
.chat-input-area{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:flex-end;
}
.chat-input{
  flex:1;background:#12122a;border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:8px;font-size:.9rem;
  outline:none;resize:none;min-height:42px;max-height:120px;
  font-family:inherit;line-height:1.5;transition:border .2s;
}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--dim)}
.btn-send{
  background:linear-gradient(135deg,#e6b422,#c9960a);color:#1a1a2e;
  border:none;padding:10px 20px;border-radius:8px;font-size:.9rem;
  font-weight:bold;cursor:pointer;transition:all .15s;white-space:nowrap;
  letter-spacing:1px;
}
.btn-send:hover{box-shadow:0 2px 12px rgba(230,180,34,0.3)}
.btn-send:disabled{opacity:.5;cursor:not-allowed}
.typing-dots{display:inline-flex;gap:3px;align-items:center;padding:4px 0}
.typing-dots span{
  width:6px;height:6px;background:var(--dim);border-radius:50%;
  animation:dotPulse 1.2s infinite;
}
.typing-dots span:nth-child(2){animation-delay:.2s}
.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{
  0%,80%,100%{transform:scale(.6);opacity:.4}
  40%{transform:scale(1);opacity:1}
}
.quick-questions{display:flex;gap:8px;flex-wrap:wrap;padding:8px 20px 12px}
.quick-q{
  background:rgba(230,180,34,0.06);border:1px solid var(--border);
  color:var(--dim);padding:5px 14px;border-radius:16px;font-size:.78rem;
  cursor:pointer;transition:all .2s;
}
.quick-q:hover{border-color:var(--accent);color:var(--accent);background:rgba(230,180,34,0.1)}

/* PWA 安装提示条 */
.install-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:9998;
  background:linear-gradient(135deg,#1a1a2e 0%,#0f0f1a 100%);
  border-top:1px solid var(--accent);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transform:translateY(100%);transition:transform .4s ease;
  padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
}
.install-bar.show{transform:translateY(0)}
.install-bar .install-text{
  flex:1;color:var(--text);font-size:.85rem;line-height:1.4;
}
.install-bar .install-text small{color:var(--dim);display:block;font-size:.72rem;margin-top:2px}
.btn-install{
  background:linear-gradient(135deg,#e6b422,#c9960a);color:#1a1a2e;
  border:none;padding:8px 20px;border-radius:8px;font-size:.85rem;
  font-weight:bold;cursor:pointer;white-space:nowrap;letter-spacing:1px;
}
.btn-dismiss{
  background:transparent;border:1px solid var(--border);color:var(--dim);
  padding:6px 12px;border-radius:6px;font-size:.75rem;cursor:pointer;
}

/* 响应式 */
@media(max-width:600px){
  html{font-size:13px}
  *{max-width:100%}
  .app{padding:12px 10px 80px}
  header{padding:20px 0 14px}
  header h1{font-size:1.6rem;letter-spacing:4px}
  .input-section{padding:16px 12px}
  .form-row{flex-direction:column;gap:10px}
  .form-group{min-width:auto;width:100%}
  .form-group select,.form-group input{width:100%;font-size:1rem;padding:10px 12px}
  .gender-row{justify-content:flex-start}
  .btn-calc{padding:12px 24px;width:100%;font-size:1rem}
  .pillars{grid-template-columns:repeat(2,1fr);gap:8px}
  .pillar{padding:12px 6px}
  .pillar-gan,.pillar-zhi{font-size:1.3rem}
  .analysis-card{padding:14px 12px;margin:10px 0;overflow-x:auto}
  .dayun-flow{gap:6px;padding:8px 0;-webkit-overflow-scrolling:touch}
  .dayun-item{min-width:62px;padding:8px 6px}
  .chat-msg{max-width:92%}
  .export-bar{flex-direction:column;gap:8px}
  .btn-export{width:100%;justify-content:center;padding:12px 16px}
  .chat-input-area{padding:10px 12px}
  .chat-messages{padding:12px 14px;max-height:400px}
  .quick-questions{padding:6px 12px 10px;gap:6px}
  .quick-q{font-size:.75rem;padding:5px 10px}
  .shishen-table th,.shishen-table td{padding:4px 6px;font-size:.78rem;white-space:nowrap}
  .wuxing-chart{height:100px}
  .summary-text{font-size:.85rem;word-break:break-word}
  .tag{font-size:.7rem;margin:2px 2px}
  .chat-section{margin:14px 0}
  .chat-header{padding:12px 14px;flex-direction:column;gap:4px;align-items:flex-start}
  .chat-input{font-size:.9rem;padding:10px 12px}
  .btn-send{padding:10px 16px}
}

/* 安全区适配（iPhone 刘海/底栏） */
@supports(padding: env(safe-area-inset-top)){
  .app{
    padding-top:calc(12px + env(safe-area-inset-top));
    padding-bottom:calc(60px + env(safe-area-inset-bottom));
  }
  .install-bar{
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
  }
}

/* 横屏手机 */
@media(max-height:500px) and (orientation:landscape){
  header{padding:10px 0}
  header h1{font-size:1.3rem}
  .pillars{grid-template-columns:repeat(4,1fr)}
  .chat-messages{max-height:250px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>八 字 命 理</h1>
    <p>排盘 · 命格 · 运势</p>
  </header>

  <!-- 输入区 -->
  <div class="input-section">
    <h2>▣ 输入生辰</h2>
    <div class="form-row">
      <div class="form-group">
        <label>出生年份</label>
        <input type="number" id="year" min="1900" max="2100" value="1990" />
      </div>
      <div class="form-group">
        <label>月</label>
        <select id="month"></select>
      </div>
      <div class="form-group">
        <label>日</label>
        <select id="day"></select>
      </div>
      <div class="form-group">
        <label>时辰</label>
        <select id="hour"></select>
      </div>
      <div class="form-group">
        <label>性别</label>
        <div class="gender-row">
          <input type="radio" name="gender" id="male" value="male" checked>
          <label for="male">男</label>
          <input type="radio" name="gender" id="female" value="female">
          <label for="female">女</label>
        </div>
      </div>
      <div class="form-group" style="flex:none">
        <label>&nbsp;</label>
        <button class="btn-calc" onclick="calculate()">排 盘</button>
      </div>
    </div>
    <div style="margin-top:10px;font-size:.75rem;color:var(--dim)">
      * 请输入公历（阳历）出生时间，系统将自动转换为农历进行排盘
    </div>
  </div>

  <!-- 结果区 -->
  <div class="result-area" id="resultArea">
    <!-- 四柱 -->
    <div class="analysis-card">
      <h3>▣ 四柱八字</h3>
      <div class="pillars" id="pillarsContainer"></div>
    </div>

    <!-- 五行分析 -->
    <div class="analysis-card">
      <h3>▣ 五行分析</h3>
      <div class="wuxing-chart" id="wuxingChart"></div>
      <div style="height:24px"></div>
      <div id="wuxingText" class="summary-text"></div>
    </div>

    <!-- 十神 -->
    <div class="analysis-card">
      <h3>▣ 十神配置</h3>
      <table class="shishen-table" id="shishenTable"></table>
      <div id="shishenText" class="summary-text" style="margin-top:10px"></div>
    </div>

    <!-- 命格 -->
    <div class="analysis-card">
      <h3>▣ 命格判定</h3>
      <div id="minggeText" class="summary-text"></div>
    </div>

    <!-- 大运 -->
    <div class="analysis-card">
      <h3>▣ 大运流年</h3>
      <div class="dayun-flow" id="dayunFlow"></div>
      <div id="dayunText" class="summary-text" style="margin-top:12px"></div>
    </div>

    <!-- 综合 -->
    <div class="analysis-card">
      <h3>▣ 综合运势分析</h3>
      <div id="summaryText" class="summary-text"></div>
    </div>

    <!-- 导出/发送 -->
    <div class="export-bar">
      <button class="btn-export primary" onclick="sendToChat()">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/><path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
        发送到对话 · 开始问答
      </button>
      <button class="btn-export" onclick="copyReport()">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        复制命盘报告
      </button>
    </div>

    <!-- 对话问答区 -->
    <div class="chat-section" id="chatSection" style="display:none">
      <div class="chat-header">
        <h3>▣ 命理问答</h3>
        <span class="chat-hint">基于你的命盘，可以追问任何细节</span>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="quick-questions" id="quickQuestions"></div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" placeholder="输入你想问的问题…比如「今年适合跳槽吗」「我的桃花运怎么样」" rows="1" onkeydown="handleChatKey(event)"></textarea>
        <button class="btn-send" id="btnSend" onclick="sendQuestion()">问</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast提示 -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
//  八字命理排盘核心引擎
// ============================================================

// ---- 基础数据 ----
const TIAN_GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI   = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const SHENG_XIAO = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
const WU_XING_GAN = ['木','木','火','火','土','土','金','金','水','水'];
const WU_XING_ZHI = ['水','土','木','木','土','火','火','土','金','金','土','水'];
const WU_XING_NAMES = ['木','火','土','金','水'];
const WX_CLASSES = {'木':'wx-wood','火':'wx-fire','土':'wx-earth','金':'wx-metal','水':'wx-water'};
const WX_COLORS = {'木':'#5cb85c','火':'#d9534f','土':'#d4a017','金':'#f0f0f0','水':'#4a9bd9'};

// 时辰名
const SHICHEN = ['子时(23-01)','丑时(01-03)','寅时(03-05)','卯时(05-07)',
  '辰时(07-09)','巳时(09-11)','午时(11-13)','未时(13-15)',
  '申时(15-17)','酉时(17-19)','戌时(19-21)','亥时(21-23)'];

// 纳音表（60甲子）

// 计算年柱（以立春为界）
function yearPillar(y, m, d){
  let adjustedYear = y;
  // 立春前算上一年
  if(m < 2 || (m === 2 && d < 4)) adjustedYear--;
  const idx = (adjustedYear - 4) % 60;
  const ganIdx = (adjustedYear - 4) % 10;
  const zhiIdx = (adjustedYear - 4) % 12;
  return { gan: TIAN_GAN[(ganIdx+10)%10], zhi: DI_ZHI[(zhiIdx+12)%12], nayin: NA_YIN[(idx+60)%60] };
}

// 计算月柱
function monthPillar(y, m, d){
  let adjustedYear = y;
  if(m < 2 || (m === 2 && d < 4)) adjustedYear--;

  // 确定月支（以节气为界）
  // 节气排列: 立春(2月)→寅, 惊蛰(3月)→卯, ...
  let monthZhiIdx;
  const jqOrder = [
    {m:1,d:6,zhi:12}, // 丑月 小寒后
    {m:2,d:4,zhi:2},  // 寅月 立春后
    {m:3,d:6,zhi:3},  // 卯月
    {m:4,d:5,zhi:4},  // 辰月
    {m:5,d:6,zhi:5},  // 巳月
    {m:6,d:6,zhi:6},  // 午月
    {m:7,d:7,zhi:7},  // 未月
    {m:8,d:8,zhi:8},  // 申月
    {m:9,d:8,zhi:9},  // 酉月
    {m:10,d:8,zhi:10}, // 戌月
    {m:11,d:7,zhi:11}, // 亥月
    {m:12,d:7,zhi:0},  // 子月
  ];

  // 找对应月支
  monthZhiIdx = 12; // 默认丑月
  for(let i = jqOrder.length - 1; i >= 0; i--){
    const jq = jqOrder[i];
    if(m > jq.m || (m === jq.m && d >= jq.d)){
      monthZhiIdx = jq.zhi;
      // 如果是12月大雪后，月柱年份要+1的概念已在adjustedYear处理
      break;
    }
  }

  // 月干 = 年干 × 2 + 月支序号（寅月起）
  const yearGanIdx = TIAN_GAN.indexOf(yearPillar(y,m,d).gan);
  // 五虎遁: 甲己之年丙作首, 乙庚之年戊为头, 丙辛之岁寻庚上, 丁壬壬位顺行流, 戊癸之年何处起, 甲寅之上好追求
  const wuhu = [2,4,6,8,0]; // 甲→丙(2), 乙→戊(4), 丙→庚(6), 丁→壬(8), 戊→甲(0)
  const monthGanStart = wuhu[yearGanIdx % 5];
  const monthNum = (monthZhiIdx - 2 + 12) % 12; // 寅月=0
  const monthGanIdx = (monthGanStart + monthNum) % 10;

  const jiaziIdx = (monthGanIdx * 6 + monthZhiIdx) % 60; // 简化纳音索引
  // 更精确的纳音计算
  let nayinIdx = 0;
  for(let i=0;i<60;i++){
    if(i%10 === monthGanIdx && i%12 === monthZhiIdx){ nayinIdx = i; break; }
  }

  return { gan: TIAN_GAN[monthGanIdx], zhi: DI_ZHI[monthZhiIdx], nayin: NA_YIN[nayinIdx % 60] };
}

// 计算日柱（使用简化的日柱算法）
function dayPillar(y, m, d){
  // 基于已知基准日推算（2000年1月1日为甲子日偏移: 该日为甲子日序号推算）
  // 使用更精确的算法：以1900年1月1日（甲子年，戊子月，甲戌日）为基准
  // 1900-01-01 的干支序号 = 10 (甲戌)
  const baseDate = new Date(1900, 0, 1);
  const targetDate = new Date(y, m - 1, d);
  const diffDays = Math.round((targetDate - baseDate) / 86400000);
  const idx = ((diffDays % 60) + 60 + 10) % 60; // 10是1900-01-01的干支序号偏移

  return {
    gan: TIAN_GAN[idx % 10],
    zhi: DI_ZHI[idx % 12],
    nayin: NA_YIN[idx % 60]
  };
}

// 计算时柱
function hourPillar(dayGan, hourIdx){
  // 五鼠遁: 甲己还加甲, 乙庚丙作初, 丙辛从戊起, 丁壬庚子居, 戊癸何方发, 壬子是真途
  const wushu = [0,2,4,6,8]; // 甲→甲(0), 乙→丙(2), 丙→戊(4), 丁→庚(6), 戊→壬(8)
  const dayGanIdx = TIAN_GAN.indexOf(dayGan);
  const hourGanStart = wushu[dayGanIdx % 5];
  const hourGanIdx = (hourGanStart + hourIdx) % 10;

  let nayinIdx = 0;
  for(let i=0;i<60;i++){
    if(i%10 === hourGanIdx && i%12 === hourIdx){ nayinIdx = i; break; }
  }

  return {
    gan: TIAN_GAN[hourGanIdx],
    zhi: DI_ZHI[hourIdx],
    nayin: NA_YIN[nayinIdx % 60]
  };
}

// ---- 五行统计 ----
function countWuxing(bazi){
  const count = {'木':0,'火':0,'土':0,'金':0,'水':0};
  const allGan = [bazi.year.gan, bazi.month.gan, bazi.day.gan, bazi.hour.gan];
  const allZhi = [bazi.year.zhi, bazi.month.zhi, bazi.day.zhi, bazi.hour.zhi];

  allGan.forEach(g => count[WU_XING_GAN[TIAN_GAN.indexOf(g)]]++);
  allZhi.forEach(z => count[WU_XING_ZHI[DI_ZHI.indexOf(z)]]++);

  // 藏干也计入（权重0.5）
  allZhi.forEach(z => {
    CANG_GAN[z].forEach((g,i) => {
      const w = i === 0 ? 0.6 : (i === 1 ? 0.3 : 0.1);
      count[WU_XING_GAN[TIAN_GAN.indexOf(g)]] += w;
    });
  });

  return count;
}

    result.push({ pos:'月支('+['本','中','余'][i]+'气)', gan: g, shishen: map[g] });
  });

  // 日支
  CANG_GAN[bazi.day.zhi].forEach((g,i)=>{

  });

  result.push({ pos:'时干', gan: bazi.hour.gan, shishen: map[bazi.hour.gan] });

    result.push({ pos:'时支('+['本','中','余'][i]+'气)', gan: g, shishen: map[g] });
  });

  return result;
}

// ---- 判断身强身弱 ----
function judgeStrength(bazi, wxCount){
  const dayGan = bazi.day.gan;
  const dayWx = WU_XING_GAN[TIAN_GAN.indexOf(dayGan)];

  // 同类（生我+同我）
  const sameType = wxCount[dayWx] + wxCount[WX_BESHENG[dayWx]];
  // 异类（我生+克我+我克）
  const diffType = wxCount[WX_SHENG[dayWx]] + wxCount[WX_BEIKE[dayWx]] + wxCount[WX_KE[dayWx]];

  // 月令得势判断
  const monthZhi = bazi.month.zhi;
  const monthWx = WU_XING_ZHI[DI_ZHI.indexOf(monthZhi)];
  const monthSupport = (monthWx === dayWx || monthWx === WX_BESHENG[dayWx]);

  const strong = sameType > diffType || (sameType === diffType && monthSupport);

  return {
    dayWx,
    sameType: Math.round(sameType * 10) / 10,
    diffType: Math.round(diffType * 10) / 10,
    strong,
    monthSupport,
    label: strong ? '身强' : '身弱'
  };
}

// ---- 喜用神 ----
function getXiyong(strength){
  const dayWx = strength.dayWx;
  if(strength.strong){
    // 身强：喜克泄耗（克我、我生、我克）
    return {
      xi: WX_KE[dayWx],       // 喜神：我克（财）
      yong: WX_SHENG[dayWx],  // 用神：我生（食伤）
      ji: dayWx,               // 忌神：同类
      ji2: WX_BESHENG[dayWx], // 忌神：生我（印）
    };
  } else {
    // 身弱：喜生扶（生我、同类）
    return {
      xi: WX_BESHENG[dayWx],  // 喜神：生我（印）
      yong: dayWx,             // 用神：同类（比劫）
      ji: WX_KE[dayWx],       // 忌神：我克（财）
      ji2: WX_BEIKE[dayWx],   // 忌神：克我（官杀）
    };
  }
}

// ---- 大运排盘 ----
function getDayun(bazi, gender, birthYear){
  const yearGan = bazi.year.gan;
  const yearGanIdx = TIAN_GAN.indexOf(yearGan);
  // 阳年男/阴年女顺排，阴年男/阳年女逆排
  const isYangYear = yearGanIdx % 2 === 0;
  const isMale = gender === 'male';
  const forward = (isYangYear && isMale) || (!isYangYear && !isMale);

  // 起运年龄（简化：约3-8岁起运，这里用简化算法）
  // 实际应该根据出生日到下一个节气的天数÷3来算
  // 简化处理：取一个合理的起运年龄
  const startAge = 3 + (TIAN_GAN.indexOf(bazi.day.gan) % 6);

  const monthGanIdx = TIAN_GAN.indexOf(bazi.month.gan);
  const monthZhiIdx = DI_ZHI.indexOf(bazi.month.zhi);

  const dayuns = [];
  for(let i = 1; i <= 8; i++){
    const step = forward ? i : -i;
    const ganIdx = ((monthGanIdx + step) % 10 + 10) % 10;
    const zhiIdx = ((monthZhiIdx + step) % 12 + 12) % 12;
    const age = startAge + (i - 1) * 10;

    let nayinIdx = 0;
    for(let j=0;j<60;j++){
      if(j%10 === ganIdx && j%12 === zhiIdx){ nayinIdx = j; break; }
    }

    dayuns.push({
      gan: TIAN_GAN[ganIdx],
      zhi: DI_ZHI[zhiIdx],
      nayin: NA_YIN[nayinIdx % 60],
      startAge: age,
      endAge: age + 9,
      startYear: birthYear + age,
      endYear: birthYear + age + 9,
    });
  }
  return { startAge, dayuns, forward };
}

// ---- 命格判定 ----
function judgeMingge(bazi, strength, wxCount, shishenList){
  const dayGan = bazi.day.gan;
  const dayWx = strength.dayWx;
  const patterns = [];

  // 统计十神出现次数
  const ssCount = {};
  shishenList.forEach(s => {
    ssCount[s.shishen] = (ssCount[s.shishen] || 0) + 1;
  });

  // 正官格
  if((ssCount['正官'] || 0) >= 2) patterns.push('正官格');
  // 七杀格
  if((ssCount['七杀'] || 0) >= 2) patterns.push('七杀格');
  // 正财格
  if((ssCount['正财'] || 0) >= 2) patterns.push('正财格');
  // 偏财格
  if((ssCount['偏财'] || 0) >= 2) patterns.push('偏财格');
  // 正印格
  if((ssCount['正印'] || 0) >= 2) patterns.push('正印格');
  // 偏印格
  if((ssCount['偏印'] || 0) >= 2) patterns.push('偏印格');
  // 食神格
  if((ssCount['食神'] || 0) >= 2) patterns.push('食神格');
  // 伤官格
  if((ssCount['伤官'] || 0) >= 2) patterns.push('伤官格');

  // 月支透干判断格局（更传统的方法）
  const monthZhi = bazi.month.zhi;
  const monthCang = CANG_GAN[monthZhi];
  const monthGan = bazi.month.gan;
  const monthSS = SHI_SHEN_MAP[dayGan][monthCang[0]];

  if(patterns.length === 0){
    // 以月令本气定格
    if(!['比肩','劫财'].includes(monthSS)){
      patterns.push(monthSS + '格');
    }
  }

  // 特殊格局检测
  // 从革格（金气极旺）
  if(wxCount['金'] > 5) patterns.push('从革格（金气极旺）');
  // 炎上格（火气极旺）
  if(wxCount['火'] > 5) patterns.push('炎上格（火气极旺）');
  // 润下格（水气极旺）
  if(wxCount['水'] > 5) patterns.push('润下格（水气极旺）');
  // 曲直格（木气极旺）
  if(wxCount['木'] > 5) patterns.push('曲直格（木气极旺）');
  // 稼穑格（土气极旺）
  if(wxCount['土'] > 5) patterns.push('稼穑格（土气极旺）');

  if(patterns.length === 0) patterns.push('普通格局');

  return patterns;
}

    '丙':'如烈日当空，热情开朗，慷慨大方，有号召力',
    '丁':'如烛火星光，细腻温和，富于心计，善于洞察',
    '戊':'如高山大地，厚重稳健，诚实守信，大气包容',
    '己':'如田园沃土，温和谦逊，细心周到，善于经营',
    '庚':'如精钢利刃，果断刚毅，义薄云天，有魄力',
    '辛':'如珠宝美玉，敏锐精致，有品味，追求完美',
    '壬':'如大江大河，智慧深邃，足智多谋，变通灵活',
    '癸':'如雨露泉水，聪慧内敛，感知力强，润物无声',
  };
  html += `<p>${dayGan}日主：${personalityMap[dayGan]}。</p>`;

  // 事业财运
  html += `<h4>⊙ 事业与财运</h4>`;
  if(ssCount['正财'] || ssCount['偏财']){
    const caiCount = (ssCount['正财']||0) + (ssCount['偏财']||0);
    if(strength.strong && caiCount >= 2){
      html += `<p>身强财旺，命中有财运根基，适合经商或独立事业。正财为主则宜稳健经营，偏财见多则有意外之财的机缘。</p>`;
    } else if(!strength.strong && caiCount >= 2){
      html += `<p>身弱财多，财虽多但难以驾驭，宜先强身（学习、合作）再求财。贪多嚼不烂，宜守不宜攻。</p>`;
    } else {
      html += `<p>财星适中，财运平稳。宜踏实积累，大运流年遇财星时有上升机遇。</p>`;
    }
  } else {
    html += `<p>命中财星不显，财运需靠自身努力和大运流年催动。宜技术立身，以才华换取财富。</p>`;
  }

  // 官运
  if((ssCount['正官']||0) + (ssCount['七杀']||0) >= 2){
    html += `<p>官杀较旺，有管理才能和事业心。正官旺者宜体制内发展，七杀旺者适合竞争性行业。</p>`;
  }

  // 感情婚姻
  html += `<h4>⊙ 感情婚姻</h4>`;
  const isMale = document.querySelector('input[name="gender"]:checked').value === 'male';
  if(isMale){
    const caiX = (ssCount['正财']||0);
    if(caiX >= 2) html += `<p>正财多见，异性缘佳，但需注意感情上的取舍，一心一意为上。</p>`;
    else if(caiX === 1) html += `<p>正财得位，婚姻缘分正，宜珍惜正缘。</p>`;
    else html += `<p>正财不显，婚缘来得晚些，大运遇财星时桃花运旺。</p>`;
  } else {
    const guanX = (ssCount['正官']||0);
    if(guanX >= 2) html += `<p>正官多见，有吸引优秀伴侣的条件，但选择需慎重。</p>`;
    else if(guanX === 1) html += `<p>正官得位，婚姻运正，有遇良配的基础。</p>`;
    else html += `<p>正官不显，婚缘宜耐心等待，大运遇官星时感情运转好。</p>`;
  }

  // 健康
  html += `<h4>⊙ 健康提示</h4>`;
  const healthMap = {
    '木':'肝胆、筋骨、眼睛',
    '火':'心脏、血液、小肠',
    '土':'脾胃、肌肉、消化',
    '金':'肺、大肠、呼吸系统',
    '水':'肾、膀胱、泌尿系统'
  };
  if(missing.length > 0){
    html += `<p>五行缺${missing.join('、')}，需注意${missing.map(w=>healthMap[w]).join('；')}方面的保养。</p>`;
  }
  if(dominant.length > 0){
    html += `<p>五行${dominant.join('、')}过旺，同样需留意${dominant.map(w=>healthMap[w]).join('；')}方面，过犹不及。</p>`;
  }
  if(missing.length === 0 && dominant.length === 0){
    html += `<p>五行较为均衡，整体体质基础不错，注意日常养生即可。</p>`;
  }

  return html;
}

// ============================================================
//  主计算函数
// ============================================================
function calculate(){
  const y = parseInt(document.getElementById('year').value);
  const m = parseInt(document.getElementById('month').value);
  const d = parseInt(document.getElementById('day').value);
  const h = parseInt(document.getElementById('hour').value);
  const gender = document.querySelector('input[name="gender"]:checked').value;

  // 验证日期
  const testDate = new Date(y, m-1, d);
  if(testDate.getMonth() !== m-1 || testDate.getDate() !== d){
    alert('日期无效，请检查');
    return;
  }

  // 排四柱
  const year = yearPillar(y, m, d);
  const month = monthPillar(y, m, d);
  const day = dayPillar(y, m, d);
  const hour = hourPillar(day.gan, h);
  const bazi = { year, month, day, hour };

  // 分析
  const wxCount = countWuxing(bazi);
  const shishenList = analyzeShishen(bazi);
  const strength = judgeStrength(bazi, wxCount);
  const xiyong = getXiyong(strength);
  const mingge = judgeMingge(bazi, strength, wxCount, shishenList);
  const dayunInfo = getDayun(bazi, gender, y);

  // 当前年龄
  const now = new Date();
  const currentAge = now.getFullYear() - y;

  // ---- 渲染四柱 ----
  const labels = ['年柱','月柱','日柱（日主）','时柱'];
  const pillars = [year, month, day, hour];
  let pillarsHtml = '';
  pillars.forEach((p, i) => {
    const ganWx = WU_XING_GAN[TIAN_GAN.indexOf(p.gan)];
    const zhiWx = WU_XING_ZHI[DI_ZHI.indexOf(p.zhi)];
    const cangGanStr = CANG_GAN[p.zhi].map(g => {
      const w = WU_XING_GAN[TIAN_GAN.indexOf(g)];
      return `<span class="${WX_CLASSES[w]}">${g}${w}</span>`;
    }).join(' ');

    pillarsHtml += `
      <div class="pillar">
        <div class="pillar-label">${labels[i]}</div>
        <div class="pillar-gan ${WX_CLASSES[ganWx]}">${p.gan}</div>
        <div class="pillar-element">${ganWx}</div>
        <div class="pillar-zhi ${WX_CLASSES[zhiWx]}">${p.zhi}</div>
        <div class="pillar-element">${zhiWx}</div>
        <div class="pillar-cang">藏干：${cangGanStr}</div>
        <div class="pillar-nayin">${p.nayin}</div>
        ${i === 0 ? '<div style="font-size:.7rem;color:var(--dim);margin-top:4px">生肖：' + SHENG_XIAO[DI_ZHI.indexOf(p.zhi)] + '</div>' : ''}
      </div>`;
  });
  document.getElementById('pillarsContainer').innerHTML = pillarsHtml;

  // ---- 渲染五行图 ----
  const maxWx = Math.max(...Object.values(wxCount));
  let chartHtml = '';
  WU_XING_NAMES.forEach(w => {
    const pct = maxWx > 0 ? (wxCount[w] / maxWx * 100) : 0;
    const val = Math.round(wxCount[w] * 10) / 10;
    chartHtml += `
      <div class="wx-bar" style="height:${Math.max(pct, 5)}%;background:${WX_COLORS[w]}">
        <div class="count">${val}</div>
        <span class="${WX_CLASSES[w]}">${w}</span>
      </div>`;
  });
  document.getElementById('wuxingChart').innerHTML = chartHtml;

  // 五行文字
  const missing = WU_XING_NAMES.filter(w => wxCount[w] < 0.5);
  let wxText = `<p>五行分布：木(${r(wxCount['木'])}) 火(${r(wxCount['火'])}) 土(${r(wxCount['土'])}) 金(${r(wxCount['金'])}) 水(${r(wxCount['水'])})</p>`;
  if(missing.length > 0) wxText += `<p>五行缺：<b style="color:var(--accent2)">${missing.join('、')}</b></p>`;
  else wxText += `<p>五行俱全，分布${maxWx - Math.min(...Object.values(wxCount)) > 3 ? '偏差较大' : '较为均衡'}。</p>`;
  document.getElementById('wuxingText').innerHTML = wxText;

  // ---- 渲染十神表 ----
  let ssHtml = '<tr><th>位置</th><th>天干</th><th>五行</th><th>十神</th></tr>';
  shishenList.forEach(s => {
    const wx = WU_XING_GAN[TIAN_GAN.indexOf(s.gan)];
    ssHtml += `<tr><td>${s.pos}</td><td class="${WX_CLASSES[wx]}">${s.gan}</td><td class="${WX_CLASSES[wx]}">${wx}</td><td>${s.shishen}</td></tr>`;
  });
  document.getElementById('shishenTable').innerHTML = ssHtml;

  // 十神文字分析
  const ssCount = {};
  shishenList.forEach(s => { ssCount[s.shishen] = (ssCount[s.shishen] || 0) + 1; });
  const ssDescMap = {
    '比肩':'自主、独立、竞争','劫财':'冒险、争夺、社交',
    '食神':'才华、口福、表达','伤官':'创意、叛逆、技艺',
    '偏财':'横财、交际、投资','正财':'稳定收入、务实',
    '七杀':'魄力、压力、权威','正官':'正统、纪律、名声',
    '偏印':'偏门学问、灵感','正印':'学业、庇护、贵人'
  };
  let ssText = '<p>十神特点：';
  Object.entries(ssCount).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    ssText += `<span class="tag tag-neutral">${k}×${v}</span> `;
  });
  ssText += '</p>';
  const topSS = Object.entries(ssCount).sort((a,b)=>b[1]-a[1])[0];
  if(topSS) ssText += `<p>${topSS[0]}最旺，主${ssDescMap[topSS[0]] || ''}，是命局的主要特征。</p>`;
  document.getElementById('shishenText').innerHTML = ssText;

  // ---- 命格 ----
  let mgHtml = `<p>命格判定：`;
  mingge.forEach(g => { mgHtml += `<span class="tag tag-neutral">${g}</span> `; });
  mgHtml += `</p>`;
  mgHtml += `<p>日主 ${bazi.day.gan} 属 <span class="${WX_CLASSES[strength.dayWx]}" style="font-weight:bold">${strength.dayWx}</span>，`;
  mgHtml += `${strength.label}。`;
  mgHtml += `同类力量(比印) <b>${strength.sameType}</b> vs 异类力量(财官食伤) <b>${strength.diffType}</b>。`;
  mgHtml += `月令${strength.monthSupport ? '得令' : '不得令'}。</p>`;
  mgHtml += `<p>喜用神：<span class="tag tag-good">${xiyong.xi}（喜神）</span><span class="tag tag-good">${xiyong.yong}（用神）</span>`;
  mgHtml += ` | 忌神：<span class="tag tag-bad">${xiyong.ji}</span><span class="tag tag-bad">${xiyong.ji2}</span></p>`;
  document.getElementById('minggeText').innerHTML = mgHtml;

  // ---- 大运 ----
  let dyHtml = '';
  dayunInfo.dayuns.forEach(dy => {
    const isCurrent = currentAge >= dy.startAge && currentAge <= dy.endAge;
    const ganWx = WU_XING_GAN[TIAN_GAN.indexOf(dy.gan)];
    const zhiWx = WU_XING_ZHI[DI_ZHI.indexOf(dy.zhi)];
    dyHtml += `
      <div class="dayun-item${isCurrent ? ' current' : ''}">
        <div class="age">${dy.startAge}-${dy.endAge}岁</div>
        <div class="gz">
          <span class="${WX_CLASSES[ganWx]}">${dy.gan}</span>
          <span class="${WX_CLASSES[zhiWx]}">${dy.zhi}</span>
        </div>
        <div class="year-range">${dy.startYear}-${dy.endYear}</div>
        <div style="font-size:.6rem;color:var(--dim)">${dy.nayin}</div>
      </div>`;
  });
  document.getElementById('dayunFlow').innerHTML = dyHtml;

  // 大运文字
  let dyText = `<p>${dayunInfo.forward ? '顺排' : '逆排'}大运，${dayunInfo.startAge}岁起运。</p>`;
  // 当前大运分析
  const currentDY = dayunInfo.dayuns.find(dy => currentAge >= dy.startAge && currentAge <= dy.endAge);
  if(currentDY){
    const dyGanWx = WU_XING_GAN[TIAN_GAN.indexOf(currentDY.gan)];
    const dyZhiWx = WU_XING_ZHI[DI_ZHI.indexOf(currentDY.zhi)];
    const isGood = dyGanWx === xiyong.xi || dyGanWx === xiyong.yong || dyZhiWx === xiyong.xi || dyZhiWx === xiyong.yong;
    dyText += `<p>当前大运：<b>${currentDY.gan}${currentDY.zhi}</b>（${currentDY.startYear}-${currentDY.endYear}年），`;
    dyText += `五行${dyGanWx}${dyZhiWx}，`;
    dyText += isGood
      ? `与喜用神相合，<span class="tag tag-good">运势向好</span>，是积极进取的好时期。`
      : `与忌神相关，<span class="tag tag-bad">宜稳健保守</span>，不宜冒进，守成为上。`;
    dyText += `</p>`;
  }

  // 流年（当前年份）
  const currentYear = now.getFullYear();
  const lyGanIdx = (currentYear - 4) % 10;
  const lyZhiIdx = (currentYear - 4) % 12;
  const lyGan = TIAN_GAN[(lyGanIdx+10)%10];
  const lyZhi = DI_ZHI[(lyZhiIdx+12)%12];
  const lyGanWx = WU_XING_GAN[TIAN_GAN.indexOf(lyGan)];
  const lyIsGood = lyGanWx === xiyong.xi || lyGanWx === xiyong.yong;
  dyText += `<p>本年流年：<b>${lyGan}${lyZhi}年</b>（${currentYear}），五行${lyGanWx}，`;
  dyText += lyIsGood ? `流年与喜用神相合，本年运势<span class="tag tag-good">整体向好</span>。` : `流年五行与命局有冲，本年宜<span class="tag tag-bad">谨慎行事</span>。`;
  dyText += `</p>`;
  document.getElementById('dayunText').innerHTML = dyText;

  // ---- 综合运势 ----
  document.getElementById('summaryText').innerHTML = generateAnalysis(bazi, strength, wxCount, xiyong, mingge, dayunInfo, shishenList);

  // 显示结果区
  document.getElementById('resultArea').classList.add('show');

  // 保存上下文供对话引擎使用
  saveContext(bazi, wxCount, shishenList, strength, xiyong, mingge, dayunInfo, gender, y, m, d, h);

  // 滚动到结果
  document.getElementById('resultArea').scrollIntoView({ behavior:'smooth', block:'start' });
}

function r(v){ return Math.round(v * 10) / 10; }

// ============================================================
//  全局状态：保存最近一次排盘结果
// ============================================================
let lastBazi = null;
let lastAnalysis = null;

// 在 calculate 末尾调用，保存全量上下文
function saveContext(bazi, wxCount, shishenList, strength, xiyong, mingge, dayunInfo, gender, y, m, d, h){
  const ssCount = {};
  shishenList.forEach(s => { ssCount[s.shishen] = (ssCount[s.shishen] || 0) + 1; });
  const now = new Date();
  const currentAge = now.getFullYear() - y;
  const currentDY = dayunInfo.dayuns.find(dy => currentAge >= dy.startAge && currentAge <= dy.endAge);

  // 流年
  const currentYear = now.getFullYear();
  const lyGanIdx = (currentYear - 4) % 10;
  const lyZhiIdx = (currentYear - 4) % 12;
  const lyGan = TIAN_GAN[(lyGanIdx+10)%10];
  const lyZhi = DI_ZHI[(lyZhiIdx+12)%12];
  const lyGanWx = WU_XING_GAN[TIAN_GAN.indexOf(lyGan)];

  const missing = WU_XING_NAMES.filter(w => wxCount[w] < 0.5);
  const weak = WU_XING_NAMES.filter(w => wxCount[w] >= 0.5 && wxCount[w] < 1.5);
  const dominant = WU_XING_NAMES.filter(w => wxCount[w] > 4);

  lastBazi = bazi;
  lastAnalysis = {
    birth: `${y}年${m}月${d}日 ${SHICHEN[h]}`,
    gender: gender === 'male' ? '男' : '女',
    fourPillars: `${bazi.year.gan}${bazi.year.zhi} ${bazi.month.gan}${bazi.month.zhi} ${bazi.day.gan}${bazi.day.zhi} ${bazi.hour.gan}${bazi.hour.zhi}`,
    yearNayin: bazi.year.nayin,
    shengxiao: SHENG_XIAO[DI_ZHI.indexOf(bazi.year.zhi)],
    dayGan: bazi.day.gan,
    dayWx: strength.dayWx,
    strengthLabel: strength.label,
    sameType: strength.sameType,
    diffType: strength.diffType,
    monthSupport: strength.monthSupport,
    wxCount: Object.entries(wxCount).map(([k,v])=>`${k}:${r(v)}`).join(' '),
    missing: missing.join('、') || '无',
    weak: weak.join('、') || '无',
    dominant: dominant.join('、') || '无',
    xiyong,
    mingge: mingge.join('、'),
    ssCount,
    shishenList,
    dayunInfo,
    currentAge,
    currentDY: currentDY ? `${currentDY.gan}${currentDY.zhi}(${currentDY.startYear}-${currentDY.endYear})` : '未知',
    currentDYObj: currentDY,
    liuNian: `${lyGan}${lyZhi}年 五行${lyGanWx}`,
    lyGanWx,
    bazi,
    y, m, d, h, gender,
  };
}

// ============================================================
//  生成纯文本报告
// ============================================================
function generateTextReport(){
  if(!lastAnalysis) return '';
  const a = lastAnalysis;
  const lines = [];
  lines.push('═══════════════════════════════════');
  lines.push('        八字命理 · 命盘报告');
  lines.push('═══════════════════════════════════');
  lines.push('');
  lines.push(`【基本信息】`);
  lines.push(`出生：${a.birth}（${a.gender}）`);
  lines.push(`生肖：${a.shengxiao} | 年纳音：${a.yearNayin}`);
  lines.push('');
  lines.push(`【四柱八字】${a.fourPillars}`);
  lines.push(`  年柱：${a.bazi.year.gan}${a.bazi.year.zhi}（${a.bazi.year.nayin}）`);
  lines.push(`  月柱：${a.bazi.month.gan}${a.bazi.month.zhi}（${a.bazi.month.nayin}）`);
  lines.push(`  日柱：${a.bazi.day.gan}${a.bazi.day.zhi}（${a.bazi.day.nayin}）← 日主`);
  lines.push(`  时柱：${a.bazi.hour.gan}${a.bazi.hour.zhi}（${a.bazi.hour.nayin}）`);
  lines.push('');
  lines.push(`【五行分布】${a.wxCount}`);
  lines.push(`  五行缺：${a.missing} | 偏弱：${a.weak} | 过旺：${a.dominant}`);
  lines.push('');
  lines.push(`【命格判定】`);
  lines.push(`  日主：${a.dayGan}（${a.dayWx}）| ${a.strengthLabel}`);
  lines.push(`  同类力量：${a.sameType} vs 异类力量：${a.diffType}`);
  lines.push(`  月令：${a.monthSupport ? '得令' : '不得令'}`);
  lines.push(`  格局：${a.mingge}`);
  lines.push('');
  lines.push(`【喜用神】`);
  lines.push(`  喜神：${a.xiyong.xi} | 用神：${a.xiyong.yong}`);
  lines.push(`  忌神：${a.xiyong.ji}、${a.xiyong.ji2}`);
  lines.push('');
  lines.push(`【十神统计】`);
  Object.entries(a.ssCount).sort((x,y)=>y[1]-x[1]).forEach(([k,v])=>{
    lines.push(`  ${k}: ${v}个`);
  });
  lines.push('');
  lines.push(`【大运】${a.dayunInfo.forward?'顺排':'逆排'}，${a.dayunInfo.startAge}岁起运`);
  a.dayunInfo.dayuns.forEach(dy=>{
    const mark = a.currentAge >= dy.startAge && a.currentAge <= dy.endAge ? ' ← 当前' : '';
    lines.push(`  ${dy.startAge}-${dy.endAge}岁：${dy.gan}${dy.zhi}（${dy.nayin}）${dy.startYear}-${dy.endYear}${mark}`);
  });
  lines.push('');
  lines.push(`【当前运势】`);
  lines.push(`  当前大运：${a.currentDY}`);
  lines.push(`  本年流年：${a.liuNian}`);
  lines.push('');
  lines.push('═══════════════════════════════════');
  return lines.join('\n');
}

// ============================================================
//  复制报告
// ============================================================
function copyReport(){
  const text = generateTextReport();
  if(!text){ showToast('请先排盘'); return; }
  navigator.clipboard.writeText(text).then(()=>{
    showToast('命盘报告已复制到剪贴板');
  }).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('命盘报告已复制到剪贴板');
  });
}

// ============================================================
//  Toast
// ============================================================
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2000);
}

// ============================================================
//  对话系统
// ============================================================
let chatHistory = []; // {role:'user'|'assistant'|'system', content:string}

function sendToChat(){
  if(!lastAnalysis){ showToast('请先排盘'); return; }

  const chatSection = document.getElementById('chatSection');
  const chatMessages = document.getElementById('chatMessages');

  // 显示对话区
  chatSection.style.display = '';

  // 清空历史
  chatHistory = [];
  chatMessages.innerHTML = '';

  // 发送命盘摘要作为系统消息
  const report = generateTextReport();
  chatHistory.push({ role: 'system', content: report });

  // 显示系统消息
  appendMessage('system', '命盘已加载，可以开始提问。基于你的八字命盘，我会从命理学角度分析回答。');

  // 显示快捷问题
  renderQuickQuestions();

  // 滚动到对话区
  chatSection.scrollIntoView({ behavior:'smooth', block:'start' });

  // 聚焦输入框
  setTimeout(()=> document.getElementById('chatInput').focus(), 300);
}

function renderQuickQuestions(){
  const questions = [
    '今年运势如何？', '我的正缘什么时候出现？', '配偶是什么样的人？',
    '桃花运怎么样？', '适合什么行业？', '财运什么时候最好？',
    '哪些年份是转折点？', '我会有几个孩子？', '健康要注意什么？',
    '命中贵人在哪？', '学业运如何？', '适合住什么方位？',
  ];
  const container = document.getElementById('quickQuestions');
  container.innerHTML = questions.map(q =>
    `<div class="quick-q" onclick="askQuick('${q}')">${q}</div>`
  ).join('');
}

function askQuick(q){
  document.getElementById('chatInput').value = q;
  sendQuestion();
}

function appendMessage(role, content){
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;

  const labelMap = { user:'你', assistant:'命理师', system:'系统' };
  let html = `<div class="msg-label">${labelMap[role] || role}</div>`;
  // 将 \n 转为 <br>，支持简单的 **加粗**
  html += content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.innerHTML = html;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function appendTyping(){
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.id = 'typingMsg';
  div.innerHTML = `<div class="msg-label">命理师</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping(){
  const el = document.getElementById('typingMsg');
  if(el) el.remove();
}

function handleChatKey(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendQuestion();
  }
  // auto-resize
  const ta = e.target;
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

// ============================================================
//  命理问答引擎（本地推理，不需要API）
// ============================================================
function sendQuestion(){
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if(!question) return;
  if(!lastAnalysis){ showToast('请先排盘'); return; }

  input.value = '';
  input.style.height = 'auto';

  // 隐藏快捷问题
  document.getElementById('quickQuestions').innerHTML = '';

  // 显示用户消息
  appendMessage('user', question);
  chatHistory.push({ role:'user', content: question });

  // 显示思考动画
  appendTyping();
  document.getElementById('btnSend').disabled = true;

  // 模拟思考延迟（让交互感更自然）
  setTimeout(()=>{
    const answer = generateAnswer(question);
    removeTyping();
    appendMessage('assistant', answer);
    chatHistory.push({ role:'assistant', content: answer });
    document.getElementById('btnSend').disabled = false;
    document.getElementById('chatInput').focus();
  }, 600 + Math.random() * 800);
}

// ============================================================
//  命理问答推理引擎
// ============================================================
function generateAnswer(question){
  const a = lastAnalysis;
  const q = question.toLowerCase();

  // ---- 关键词匹配 + 命盘数据推理 ----

  // 今年/流年运势
  if(q.includes('今年') || q.includes('流年') || q.includes('2026') || q.includes('本年')){

    if(lyIsGood){
      ans += `流年五行${a.lyGanWx}与你的喜用神（${a.xiyong.xi}/${a.xiyong.yong}）相合，整体运势向好。\n\n`;
      ans += `具体表现：\n`;
      ans += `• 事业方面有上升机会，可以主动争取\n`;
      ans += `• 贵人运较旺，多留意身边${a.xiyong.xi}属性的人\n`;
      ans += `• 财运有增长空间，适合稳步投资\n`;
      if(a.missing !== '无' && a.missing.includes(a.lyGanWx)){
        ans += `• 特别利好：流年五行补了你命中所缺的${a.lyGanWx}，有填补短板之象\n`;
      }
    } else {
      ans += `流年五行${a.lyGanWx}与忌神（${a.xiyong.ji}/${a.xiyong.ji2}）有关，需谨慎行事。\n\n`;
      ans += `建议：\n`;
      ans += `• 不宜冒进，守成为上，大的变动（跳槽、投资）宜推迟\n`;
      ans += `• 注意人际关系，避免口舌之争\n`;
      ans += `• 可通过佩戴${a.xiyong.xi}属性的颜色/物品来化解\n`;
    }
    if(a.currentDYObj){
      ans += `\n当前大运${a.currentDY}，`;
      const dyWx = WU_XING_GAN[TIAN_GAN.indexOf(a.currentDYObj.gan)];
      const dyGood = dyWx === a.xiyong.xi || dyWx === a.xiyong.yong;
      ans += dyGood ? '大运走势也偏好，流年+大运双重加持。' : '大运走势偏紧，今年更需稳健。';
    }
    return ans;
  }

  // 事业/工作/跳槽/创业
  if(q.includes('事业') || q.includes('工作') || q.includes('跳槽') || q.includes('创业') || q.includes('行业') || q.includes('职业')){
    let ans = `**事业分析（日主${a.dayGan}${a.dayWx} · ${a.strengthLabel}）**\n\n`;

    // 根据十神配置分析
    const guanSha = (a.ssCount['正官']||0) + (a.ssCount['七杀']||0);
    const shishang = (a.ssCount['食神']||0) + (a.ssCount['伤官']||0);
    const cai = (a.ssCount['正财']||0) + (a.ssCount['偏财']||0);
    const yin = (a.ssCount['正印']||0) + (a.ssCount['偏印']||0);

    if(guanSha >= 3){
      ans += `你命中官杀较旺，天生有管理欲和权威感。\n`;
      if(a.ssCount['正官'] > a.ssCount['七杀']){
        ans += `• 正官为主：适合体制内、管理岗、公务系统\n`;
      } else {
        ans += `• 七杀为主：适合竞争性行业，如金融、科技、军警\n`;

    if(shishang >= 3){

    }
    if(yin >= 3){
      ans += `印星较旺，学习能力强，适合学术、技术、研究方向。\n`;
    }

    // 五行行业推荐

    } else {
      const zhengguan = a.ssCount['正官'] || 0;
      const qisha = a.ssCount['七杀'] || 0;

      if(zhengguan >= 2){
        ans += `• 正官多见，有吸引优秀男性的条件\n`;
        ans += `• 但正官多也代表选择多，需果断\n`;
      } else if(zhengguan === 1 && qisha <= 1){
        ans += `• 官杀适中，婚姻运正，有遇良配的基础\n`;

    const personalityMap = {
      '甲':'如参天大树，正直坚韧，有领导力。优点是有原则、有担当；缺点是有时过于固执、不够变通。适合做决策者和引领者。',
      '乙':'如藤蔓花草，柔韧灵活，善于交际。优点是适应力强、温和有亲和力；缺点是有时缺乏魄力。适合做协调者和沟通者。',
      '丙':'如烈日当空，热情开朗，慷慨大方。优点是有感染力、行动力强；缺点是容易冲动、注意力分散。适合做激励者和开拓者。',
      '丁':'如烛火星光，细腻温和，富于心计。优点是观察力强、有谋略；缺点是有时过于敏感。适合做谋划者和分析师。',
      '戊':'如高山大地，厚重稳健，诚实守信。优点是可靠、大气、包容；缺点是行动可能偏慢。适合做管理者和守护者。',
      '己':'如田园沃土，温和谦逊，细心周到。优点是善于经营、低调务实；缺点是有时过于保守。适合做经营者和服务者。',
      '庚':'如精钢利刃，果断刚毅，义薄云天。优点是有魄力、敢作敢当；缺点是有时过于强硬。适合做执行者和改革者。',
      '辛':'如珠宝美玉，敏锐精致，有品味。优点是追求完美、有鉴赏力；缺点是有时过于挑剔。适合做创作者和品质把关者。',
      '壬':'如大江大河，智慧深邃，足智多谋。优点是思维活跃、变通灵活；缺点是有时想太多而不行动。适合做策略师和创新者。',
      '癸':'如雨露泉水，聪慧内敛，感知力强。优点是洞察力好、内心丰富；缺点是有时过于内向。适合做研究者和幕后推动者。',
    };
    let ans = `**性格分析（${a.dayGan}日主 · ${a.dayWx}）**\n\n`;
    ans += personalityMap[a.dayGan] || '';

    // 十神补充性格
    const topSS = Object.entries(a.ssCount).sort((x,y)=>y[1]-x[1])[0];
    if(topSS){
      const ssPersonality = {
        '比肩':'独立、自主、竞争意识强','劫财':'社交活跃、敢冒险、争胜心强',
        '食神':'享受生活、有才华、爱表达','伤官':'创意丰富、不拘一格、追求自由',
        '偏财':'人脉广、慷慨、有投资眼光','正财':'务实、节俭、有理财头脑',
        '七杀':'有魄力、抗压强、不服输','正官':'守规矩、有责任感、注重名声',
        '偏印':'爱研究、灵感多、思维独特','正印':'爱学习、有贵人缘、重感情'
      };
      ans += `\n\n**十神性格补充：**\n${topSS[0]}最旺——${ssPersonality[topSS[0]] || ''}`;
    }
    return ans;
  }

  // 命格
  if(q.includes('命格') || q.includes('格局')){
    let ans = `**命格详解**\n\n`;
    ans += `你的命格为：**${a.mingge}**\n\n`;
    const geju_desc = {
      '正官格':'为人正直，重规则，适合管理和体制内发展',
      '七杀格':'有魄力和压力，适合竞争性强的领域',
      '正财格':'务实理财，稳定收入型，善经营',
      '偏财格':'有横财运和投资眼光，社交能力强',
      '正印格':'学业运好，有贵人庇护，适合文化教育领域',
      '偏印格':'思维独特，有偏门才华，适合技术研究',
      '食神格':'有口福和才华，性格温和，生活品质高',
      '伤官格':'创造力强，叛逆不羁，适合艺术和创业',
    };
    a.mingge.split('、').forEach(g => {
      const desc = geju_desc[g];
      if(desc) ans += `**${g}**：${desc}\n`;
    });
    ans += `\n${a.strengthLabel}，同类${a.sameType} vs 异类${a.diffType}，月令${a.monthSupport?'得令':'不得令'}。`;
    return ans;
  }

  // 默认：通用分析
  let ans = `根据你的命盘分析：\n\n`;
  ans += `**基本格局：**${a.dayGan}日主，${a.dayWx}命，${a.strengthLabel}，${a.mingge}。\n\n`;
  ans += `你的问题涉及到「${question}」，从命理角度来看：\n\n`;

  // 根据身强身弱给通用建议
  if(a.strengthLabel === '身强'){
    ans += `你命局身强，自身力量充足，适合主动出击、承担责任。\n`;
    ans += `• 喜泄（食伤发挥才华）和耗（财运克出），忌再加强（印比过多）\n`;
    ans += `• 关键是找到输出口——把能量转化为成果\n`;
  } else {
    ans += `你命局身弱，需要借助外力。\n`;
    ans += `• 喜生扶（印星学习、比劫合作），忌消耗过度（财多、官杀压制）\n`;
    ans += `• 关键是培养根基——先强身后求财\n`;
  }

  ans += `\n如果想了解更具体的方面，可以问我关于 **事业、财运、感情、健康、流年、大运** 等话题。`;
  return ans;
}

//  PWA 注册 + 安装提示
// ============================================================
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW failed:', err));
  });
}

let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // 显示安装提示条
  const bar = document.getElementById('installBar');
  if(bar) {
    bar.classList.add('show');
  }
});

function installApp(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(result => {
    deferredPrompt = null;
    document.getElementById('installBar').classList.remove('show');
    if(result.outcome === 'accepted'){
      showToast('安装成功！可以在桌面找到应用');
    }
  });
}

function dismissInstall(){
  document.getElementById('installBar').classList.remove('show');
}

// 检测是否已安装（standalone模式）
window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBar').classList.remove('show');
  showToast('应用已安装到桌面');
});

</script>

<!-- 安装提示条 -->
<div class="install-bar" id="installBar">
  <div class="install-text">
    📱 安装到桌面，随时查看命盘
    <small>无需下载，离线也能用</small>
  </div>
  <button class="btn-install" onclick="installApp()">安装</button>
  <button class="btn-dismiss" onclick="dismissInstall()">暂不</button>
</div>
